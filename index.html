<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 10px; background-color: white; }
        #quiz-container { max-width: 550px; margin: 10px auto; padding: 25px; border-radius: 15px; background: #fff; border: 1px solid #f0f0f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .quiz-frame { display: none; }
        .quiz-frame.active { display: block; }
        h3 { color: #6096db; margin-top: 0; border-bottom: 2px solid #f0f7ff; padding-bottom: 10px; }
        .option-list label { display: flex; align-items: center; background: #f9f9f9; padding: 14px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .option-list label:hover { background: #f0f7ff; border-color: #6096db; }
        .option-list input { margin-right: 15px; width: 18px; height: 18px; }
        .quiz-nav-btn { width: 100%; padding: 16px; border: none; border-radius: 10px; color: white; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .next-btn { background: #6096db; }
        .finish-btn { background: #2ecc71; }
        #progress-bg { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-bottom: 25px; }
        #progress-bar { width: 25%; height: 100%; background: #6096db; border-radius: 10px; transition: 0.5s; }
        .results-box { text-align: left; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-header">
        <div id="progress-bg"><div id="progress-bar"></div></div>
    </div>

    <div id="frame-1" class="quiz-frame active">
        <h3>🏡 Daily Living</h3>
        <div class="option-list">
            <label><input type="checkbox" class="risk"> Trouble getting dressed or ready?</label>
            <label><input type="checkbox" class="risk"> Feeling unsteady walking the house?</label>
            <label><input type="checkbox" class="risk"> Any falls or close calls recently?</label>
            <label><input type="checkbox" class="risk"> Bathing or showering getting harder?</label>
            <label><input type="checkbox" class="risk"> Skipping meals because cooking is too much?</label>
        </div>
        <button class="quiz-nav-btn next-btn" onclick="move(2)">Next Section →</button>
    </div>

    <div id="frame-2" class="quiz-frame">
        <h3>💊 Health & Memory</h3>
        <div class="option-list">
            <label><input type="checkbox" class="risk"> Difficulty tracking medications?</label>
            <label><input type="checkbox" class="risk"> Forgetting meds or taking them twice?</label>
            <label><input type="checkbox" class="risk"> Noticing changes in memory lately?</label>
            <label><input type="checkbox" class="risk"> Bills or paperwork feel overwhelming?</label>
            <label><input type="checkbox" class="risk"> Feeling confused about the date or time?</label>
        </div>
        <button class="quiz-nav-btn next-btn" onclick="move(3)">Next Section →</button>
    </div>

    <div id="frame-3" class="quiz-frame">
        <h3>🍽️ Home & Safety</h3>
        <div class="option-list">
            <label><input type="checkbox" class="risk"> Unexplained weight loss?</label>
            <label><input type="checkbox" class="risk"> Grocery shopping has become difficult?</label>
            <label><input type="checkbox" class="risk"> Laundry or clutter is piling up?</label>
            <label><input type="checkbox" class="risk"> Stairs are becoming scary or difficult?</label>
            <label><input type="checkbox" class="risk"> Feeling unsafe at home at night?</label>
        </div>
        <button class="quiz-nav-btn next-btn" onclick="move(4)">Next Section →</button>
    </div>

    <div id="frame-4" class="quiz-frame">
        <h3>😊 Social & Support</h3>
        <div class="option-list">
            <label><input type="checkbox" class="risk"> Feeling lonely or bored often?</label>
            <label><input type="checkbox" class="risk"> Issues with driving or feeling unsafe on the road?</label>
            <label><input type="checkbox" class="risk"> Stopped doing activities you enjoy?</label>
            <label><input type="checkbox" class="risk"> Worrying about being a burden to family?</label>
            <label><input type="checkbox" class="risk"> Simple tasks just feeling "harder" lately?</label>
        </div>
        <button class="quiz-nav-btn finish-btn" onclick="finish()">See My Results</button>
    </div>

    <div id="results" class="quiz-frame results-box">
        <h2 id="res-h" style="margin-top:0; color:#333; text-align:center;"></h2>
        <p id="res-p" style="font-size: 1.05em; color: #555;"></p>
        <div id="next-steps" style="background: #f0f7ff; padding: 20px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #6096db;"></div>
        <button style="display:block; margin: 25px auto; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;" onclick="location.reload()">Restart Assessment</button>
    </div>
</div>

<script>
    function move(step) {
        document.querySelectorAll('.quiz-frame').forEach(f => f.classList.remove('active'));
        document.getElementById('frame-' + step).classList.add('active');
        document.getElementById('progress-bar').style.width = (step/4*100) + '%';
        window.scrollTo(0,0);
    }
    function finish() {
        const score = document.querySelectorAll('.risk:checked').length;
        document.getElementById('quiz-header').style.display = 'none';
        
        // Show result frame
        document.querySelectorAll('.quiz-frame').forEach(f => f.classList.remove('active'));
        document.getElementById('results').classList.add('active');
        
        // Ensure the view jumps to the top so they see the result
        window.scrollTo(0,0);

        const h = document.getElementById('res-h');
        const p = document.getElementById('res-p');
        const steps = document.getElementById('next-steps');

        if(score <= 2) { 
            h.innerText = "You’re Doing Well!"; 
            p.innerText = "It looks like things are manageable right now. Keeping an eye on safety and staying active is the best way to maintain your independence. Our Independent Living residences would be a great fit.";
            steps.innerHTML = "<strong>Next Step:</strong><ul><li>Speak to a John-Wesley Villas representative about our Independent Living availability.</li></ul>";
        }
        else if(score <= 6) { 
            h.innerText = "Support Could Be Beneficial"; 
            p.innerText = "A few red flags suggest that daily tasks are becoming stressful. Small changes now, like extra help at home or exploring life at John-Wesley Villas, can prevent bigger issues later.";
            steps.innerHTML = "<strong>Next Steps:</strong><ul><li>Explore meal delivery or light housekeeping services.</li><li>Schedule a tour just to see what the \"supportive lifestyle\" looks like before you need it.</li></ul>";
        }
        else { 
            h.innerText = "It's Time to Seriously Explore Options"; 
            p.innerText = "Your safety and wellness are the top priorities. Based on your answers, your current routine may be becoming unsafe. Assisted living isn't about losing independence; it’s about gaining the support needed to live with less stress. We're here to help.";
            steps.innerHTML = "<strong>Next Steps:</strong><ul><li>Schedule a tour with John-Wesley Villas this week.</li><li>Talk to your family or a trusted doctor about a transition plan.</li></ul>";
        }
    }
</script>
</body>
</html>
